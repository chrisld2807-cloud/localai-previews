<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Out Tree Care LLC | Professional Tree Services in Fernandina Beach</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            line-height: 1.6;
            color: #2c3e21;
            overflow-x: hidden;
        }

        .nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d5016;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4a7c2c 0%, #2d5016 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e21;
            font-weight: 500;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: #4a7c2c;
        }

        .nav-cta {
            background: #4a7c2c;
            color: white !important;
            padding: 0.6rem 1.5rem;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            background: #2d5016;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 124, 44, 0.3);
        }

        .hero {
            background: linear-gradient(135deg, rgba(45, 80, 22, 0.95) 0%, rgba(74, 124, 44, 0.9) 100%),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%23558b2f" width="1200" height="800"/><path fill="%234a7c2c" opacity="0.3" d="M0 400L50 380C100 360 200 320 300 300C400 280 500 280 600 300C700 320 800 360 900 360C1000 360 1100 320 1150 300L1200 280V800H0Z"/></svg>');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 90vh;
            display: flex;
            align-items: center;
            position: relative;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .hero-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            color: white;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-subtitle {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #fff;
            color: #2d5016;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
            background: #f0f0f0;
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: white;
            color: #2d5016;
            transform: translateY(-3px);
        }

        .section {
            padding: 5rem 2rem;
        }

        .section-dark {
            background: #f8f9f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: #2d5016;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .section-subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: #5a6c51;
            margin-bottom: 3rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-text h3 {
            font-size: 2rem;
            color: #2d5016;
            margin-bottom: 1.5rem;
        }

        .about-text p {
            font-size: 1.1rem;
            color: #5a6c51;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .about-image {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, rgba(74, 124, 44, 0.8), rgba(45, 80, 22, 0.8)),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400"><rect fill="%234a7c2c" width="400" height="400"/><circle fill="%23558b2f" cx="200" cy="150" r="80"/><rect fill="%233d5a2a" x="180" y="230" width="40" height="170"/><path fill="%23558b2f" d="M200 80Q220 100 240 80Q250 90 240 110Q230 100 220 120Q210 100 200 120Q190 100 180 120Q170 100 160 110Q150 90 160 80Q180 100 200 80Z"/></svg>');
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .service-card {
            background: white;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border-top: 4px solid #4a7c2c;
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .service-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #4a7c2c 0%, #2d5016 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            color: white;
        }

        .service-card h3 {
            font-size: 1.5rem;
            color: #2d5016;
            margin-bottom: 1rem;
        }

        .service-card p {
            color: #5a6c51;
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .service-features {
            list-style: none;
            margin-top: 1rem;
        }

        .service-features li {
            padding: 0.5rem 0;
            color: #5a6c51;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .service-features li:before {
            content: "✓";
            color: #4a7c2c;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .why-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .why-item {
            text-align: center;
            padding: 2rem;
        }

        .why-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4a7c2c 0%, #2d5016 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: white;
        }

        .why-item h3 {
            font-size: 1.4rem;
            color: #2d5016;
            margin-bottom: 1rem;
        }

        .why-item p {
            color: #5a6c51;
            line-height: 1.7;
        }

        .contact-section {
            background: linear-gradient(135deg, rgba(45, 80, 22, 0.95) 0%, rgba(74, 124, 44, 0.9) 100%);
            color: white;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-top: 3rem;
        }

        .contact-info h3 {
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        .contact-icon {
            width: 50px;
            height: 50px;
            background: white;
            color: #2d5016;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .contact-details h4 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .contact-details p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .contact-details a {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .contact-details a:hover {
            opacity: 0.8;
        }

        .hours-list {
            list-style: none;
            font-size: 1.1rem;
        }

        .hours-list li {
            padding: 0.5rem 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .contact-cta {
            background: white;
            color: #2d5016;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .contact-cta h3 {
            color: #2d5016;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
        }

        .contact-cta p {
            color: #5a6c51;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.7;
        }

        .cta-button {
            display: block;
            width: 100%;
            text-align: center;
            padding: 1.2rem;
            background: #4a7c2c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .cta-button:hover {
            background: #2d5016;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74, 124, 44, 0.4);
        }

        .phone-link {
            display: block;
            text-align: center;
            font-size: 1.3rem;
            color: #4a7c2c;
            text-decoration: none;
            font-weight: 600;
            margin-top: 1rem;
        }

        footer {
            background: #1a2e10;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-content p {
            opacity: 0.9;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #2d5016;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 2rem;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            }

            .nav-links.active {
                display: flex;
            }

            .mobile-menu-btn {
                display: block;
            }

            .hero h1 {
                font-size: 2.2rem;
            }

            .hero-subtitle {
                font-size: 1.2rem;
            }

            .hero-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                text-align: center;
            }

            .about-content {
                grid-template-columns: 1fr;
            }

            .about-image {
                height: 300px;
            }

            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .section {
                padding: 3rem 1.5rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .services-grid {
                grid-template-columns: 1fr;
            }

            .why-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.8rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .nav-container {
                padding: 0 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .section-title {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon">🌳</div>
                <span>Branch Out Tree Care</span>
            </div>
            <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#why-us
